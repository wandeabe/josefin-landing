  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1<\u002Fdiv>\n          <div>\n            <div class=\"how-icon\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--acc)\" stroke-width=\"1.5\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M2 8l10 6 10-6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div class=\"how-title\">Connect your inbox<\u002Fdiv>\n            <div class=\"how-body\">Forward school emails or auto-sync. Josefin reads them and extracts deadlines, payments and events - automatically.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-step\">\n          <div class=\"how-num\">02<\u002Fdiv>\n          <div>\n            <div class=\"how-icon\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--acc)\" stroke-width=\"1.5\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div class=\"how-title\">Events land in your calendar<\u002Fdiv>\n            <div class=\"how-body\">Directly into Google, Apple or Outlook. Conflicts are flagged before they become problems.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"how-step\">\n          <div class=\"how-num\">03<\u002Fdiv>\n          <div>\n            <div class=\"how-icon\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 32 32\"><rect width=\"32\" height=\"32\" rx=\"7\" fill=\"#25D366\"><\u002Frect><path d=\"M16 6.5C10.7 6.5 6.5 10.7 6.5 16c0 1.7.45 3.35 1.3 4.8L6.5 25.5l4.8-1.28A9.4 9.4 0 0016 25.5c5.3 0 9.5-4.2 9.5-9.5S21.3 6.5 16 6.5zm4.65 12.87c-.19.54-1.1 1.02-1.52 1.08-.39.06-.88.08-1.43-.1-.33-.1-.76-.24-1.3-.48-2.28-.99-3.77-3.29-3.88-3.44-.12-.15-.91-1.22-.91-2.32s.57-1.65.78-1.88c.19-.21.42-.26.56-.26h.4c.13 0 .3-.05.48.36.19.44.63 1.52.68 1.63.06.11.1.24.02.38-.07.15-.11.24-.23.37-.11.12-.24.27-.34.37-.11.11-.23.23-.1.45.13.22.57.94 1.24 1.52.85.76 1.57 1 1.79 1.11.22.11.35.1.48-.06.1 l\">\n        <div class=\"pf\">\n          <div class=\"pf-notch\"><\u002Fdiv>\n          <div class=\"pf-screen\">\n            <div class=\"wa-hd\">\n              <div class=\"wa-av\" id=\"waAv\" style=\"background:#7CB9A0;\">S<\u002Fdiv>\n              <div><div class=\"wa-nm\" id=\"waNm\">Sarah<\u002Fdiv><div class=\"wa-st\" id=\"waSt\">online<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"wa-body\" id=\"waBody\">\n              <div class=\"wa-bbl vis\">📅 School just emailed. Emma's trip permission + £15 is due Wednesday by 3pm.<span class=\"wa-tick\">✓✓<\u002Fspan><\u002Fdiv>\n              <div class=\"wa-bbl vis\">Marcus has his quarterly review then - I've flagged the clash. Want me to remind you at noon? 🗓<span class=\"wa-tick\">✓✓<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phone-tabs\">\n          <div class=\"phone-tab active\" id=\"ptSarah\">Sarah<\u002Fdiv>\n          <div class=\"phone-tab\" id=\"ptMarcus\">Marcus<\u002Fdiv>\n          <div class=\"phone-tab\" id=\"ptSofia\">Sofia<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"demo-prog\" id=\"demoProg\">\n          <div class=\"prog-dot done\"><\u002Fdiv><div class=\"prog-dot done\"><\u002Fdiv><div class=\"prog-dot done\"><\u002Fdiv>\n          <div class=\"prog-dot done\"><\u002Fdiv><div class=\"prog-dot done\"><\u002Fdiv><div class=\"prog-dot active\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"act-panel\">\n        <div class=\"act-step done\" id=\"as0\"><div class=\"act-ico\">📧<\u002Fdiv><div><div class=\"act-lbl\">Reading email<\u002Fdiv><div class=\"act-det\">St Mary's School · field trip<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"act-step done\" id=\"as1\"><div class=\"act-ico\">📅<\u002Fdiv><div><div class=\"act-lbl\">Event created<\u002Fdiv><div class=\"act-det\">Permission + £15 · Wed 3pm<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"act-step done\" id=\"as2\"><div class=\"act-ico\">⚠️<\u002Fdiv><div><div class=\"act-lbl\">Clash detected<\u002Fdiv><div class=\"act-det\">Marcus: Quarterly review 2-4pm<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"act-step done\" id=\"as3\"><div class=\"act-ico\">💬<\u002Fdiv><div><div class=\"act-lbl\">Sarah notified<\u002Fdiv><div class=\"act-det\">Permission + clash flagged<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"act-step done\" id=\"as4\"><div class=\"act-ico\">💬<\u002Fdiv><div><div class=\"act-lbl\">Marcus briefed<\u002Fdiv><div class=\"act-det\">Awareness only · no action needed<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"act-step done\" id=\"as5\"><div class=\"act-ico\">💬<\u002Fdiv><div><div class=\"act-lbl\">Sofia briefed<\u002Fdiv><div class=\"act-det\">8:30am · packed lunch · waterproofs<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEATURES -->\n<section class=\"section\" style=\"background:#fff;\">\n  <div class=\"wrap\">\n    <div class=\"feat-hd\">\n      <div>\n        <div class=\"sec-eye\">Built for real families<\u002Fdiv>\n        <h2 class=\"sec-h\">Everything your household<br><em>actually needs.<\u002Fem><\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:1rem;line-height:1.85;color:var(--ink-60);\">Josefin isn't a task manager or another app to maintain. It's the connective tissue between everything already happening - quietly making sure nothing falls through the cracks.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feat-grid\">\n      <div class=\"feat-card\"><div class=\"feat-num\">01<\u002Fdiv><div class=\"feat-title\">School email triage<\u002Fdiv><div class=\"feat-body\">Every school communication is read, parsed and turned into a clear action or reminder. No more scanning inboxes for buried deadlines.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-card\"><div class=\"feat-num\">02<\u002Fdiv><div class=\"feat-title\">Conflict detection<\u002Fdiv><div class=\"feat-body\">Before an event is created, Josefin checks across calendars for clashes - and flags them before they become a problem.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-card\"><div class=\"feat-num\">03<\u002Fdiv><div class=\"feat-title\">Smart delegation<\u002Fdiv><div class=\"feat-body\">Each message is tailored to who's receiving it. The nanny gets operational detail. Your partner gets a heads-up. Nobody gets noise.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-card\"><div class=\"feat-num\">04<\u002Fdiv><div class=\"feat-title\">Payment tracking<\u002Fdiv><div class=\"feat-body\">School trips, club fees, uniforms - Josefin notices payment requests and creates timely reminders before the deadline.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-card\"><div class=\"feat-num\">05<\u002Fdiv><div class=\"feat-title\">Works via WhatsApp<\u002Fdiv><div class=\"feat-body\">No app to install for your family circle. Messages arrive in WhatsApp, exactly where everyone already is.<\u002Fdiv><\u002Fdiv>\n      <div class=\"feat-card\"><div class=\"feat-num\">06<\u002Fdiv><div class=\"feat-title\">Private by design<\u002Fdiv><div class=\"feat-body\">Your data is never trained on. Josefin reads to act, not to learn from you. Designed for families who value discretion.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INTERSTITIAL -->\n<section class=\"relief-sec\" style=\"background:var(--ink);padding:0;\">\n  <div class=\"relief-grid\">\n    <div class=\"relief-img\">\n      <img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJY rsonal assistants<\u002Fth>\n          <th>AI productivity tools<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td>Works in tools you already use<\u002Ftd>\n          <td class=\"josefin-col ck\">✓ Email, calendar, WhatsApp<\u002Ftd>\n          <td class=\"cp\">Partial - manual entry<\u002Ftd>\n          <td class=\"cx\">✗ New interface<\u002Ftd>\n          <td class=\"cx\">✗ App-first<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Multi-actor coordination<\u002Ftd>\n          <td class=\"josefin-col ck\">✓ Everyone who helps<\u002Ftd>\n          <td class=\"cx\">✗ Single user<\u002Ftd>\n          <td class=\"cx\">✗ Single user<\u002Ftd>\n          <td class=\"cx\">✗ Single user<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Passive - no prompting needed<\u002Ftd>\n          <td class=\"josefin-col ck\">✓ Event-driven, automatic<\u002Ftd>\n          <td class=\"cx\">✗ Manual<\u002Ftd>\n          <td class=\"cx\">✗ Must be asked<\u002Ftd>\n          <td class=\"cx\">✗ Must be prompted<\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td>Conflict detection<\u002Ftd>\n          <td class=\"josefin-col ck\">✓ Flagged proactively<\u002Ftd>\n          <td class=\"cp\">Partial - basic<\u002Ftd>\n          <td class=\"cx\">✗<\u002Ftd>\n          <td class=\"cx\">✗<\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TESTIMONIALS -->\n<section class=\"section\" id=\"families\" style=\"background:var(--bg);\">\n  <div class=\"wrap\">\n    <div class=\"sec-eye\">From the pilot<\u002Fdiv>\n    <h2 class=\"sec-h\">Real families.<br><em>Real freedom.<\u002Fem><\u002Fh2>\n    <div class=\"testi-grid\">\n      <div class=\"testi-card\">\n        <div class=\"testi-body\" style=\"padding:2.5rem 2rem;\">\n          <div class=\"testi-q\" style=\"font-size:1.25rem;\">\"You're like an organised version of my brain!\"<\u002Fdiv>\n          <div class=\"test <\u002Fdiv>\n    <h2 class=\"sec-h\">Before you <em>ask.<\u002Fem><\u002Fh2>\n    <div class=\"faq-list\">\n      <details class=\"faq-item\"><summary><span class=\"faq-q\">Is my email data private?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fsummary><div class=\"faq-a\">Josefin reads only the messages you connect. Your data is never sold, never used for training, and you can disconnect at any time.<\u002Fdiv><\u002Fdetails>\n      <details class=\"faq-item\"><summary><span class=\"faq-q\">Do I need to download anything?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fsummary><div class=\"faq-a\">No. Josefin works through your existing email, calendar and WhatsApp. Everything happens where you already are - no new app required.<\u002Fdiv><\u002Fdetails>\n      <details class=\"faq-item\"><summary><span class=\"faq-q\">How does my nanny use it?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fsummary><div class=\"faq-a\">They don't need to install anything. Josefin sends them WhatsApp or SMS messages with exactly what they need to know, when they need to know it.<\u002Fdiv><\u002Fdetails>\n      <details class=\"faq-item\"><summary><span class=\"faq-q\">Is it free to join?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fsummary><div class=\"faq-a\">Yes - the waitlist is free, and early access is free too. You get the service; we get your honest feedback. No commitment required.<\u002Fdiv><\u002Fdetails>\n      <details class=\"faq-item\"><summary><span class=\"faq-q\">Why can't I just use Claude or ChatGPT to do this myself?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fsummary><div class=\"faq-a\">It's a fair question - especially as Claude, ChatGPT and others now offer agents, memory and connectors that can read email or browse the web. But even with those tools, you're still the one who has to set them up, maintain the connections, and remember to check in. Josefin is built from the ground up around your household: it knows your children, your nanny, your calendar, and the rhythm of your family. It acts without being asked, coordinates across multiple people, and tailors each message to who's receiving it. General-purpose AI is a powerful tool; Josefin is a service designed specifically for this job.<\u002Fdiv><\u002Fdetails>\n      <details class=\"faq-item\"><summary><span class=\"faq-q\">What email providers do you support?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fsummary><div class=\"faq-a\">Gmail and Outlook are fully supported today. Apple Mail and other providers are on the roadmap. You can also simply forward emails to a Josefin address.<\u002Fdiv><\u002Fdetails>\n      <details class=\"faq-item\"><summary><span class=\"faq-q\">Can multiple parents use the same household?<\u002Fspan><span class=\"faq-icon\">+<\u002Fspan><\u002Fsummary><div class=\"faq-a\">Yes - Josefin is designed for the whole household. Both parents can be connected, and Josefin coordinates messages between them, the nanny, grandparents, and anyone else in your circle.<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<div class=\"cta-sec\" id=\"waitlist\">\n  <div class=\"cta-bg-j\" aria-hidden=\"true\">J<\u002Fdiv>\n  <div class=\"cta-inner\">\n    <div class=\"sec-eye acc\" style=\"justify-content:center;\">Join the waitlist<\u002Fdiv>\n    <h2 class=\"cta-h\">Ready to<br>breathe again?<\u002Fh2>\n    <p class=\"cta-sub\">Join the waitlist. We'll reach out personally and set everything up with you.<\u002Fp>\n    <a href=\"https://tally.so/r/VLbL4g\" target=\"_blank\" rel=\"noopener\" class=\"btn-cta\">Get Early Access →<\u002Fa>\n    <div class=\"cta-note\">Free to join · No commitment · No new apps<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"ft-inner\">\n    <div class=\"ft-wm\">Josefin<\u002Fdiv>\n    <div class=\"ft-links\">\n      <a href=\"mailto:hello@josefin.ai\">Contact<\u002Fa>\n      <a href=\"#\
